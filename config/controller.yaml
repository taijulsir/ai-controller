controller:
  name: Taijul AI Controller
  version: 1.0.0
  environment: production

workspace:
  root: /home/aiagent/projects

task:
  max_concurrent_jobs: 1
  timeout_minutes: 30

approval:
  mode: manual
  # Generic list of task types requiring approval -- add an entry here to
  # gate a newly-introduced command, without any code or schema change.
  # Equivalent to the previous require_before_git_push: true /
  # require_before_pull_request: false, plus gating the new "merge" command
  # (a potentially significant operation) the same way push already is.
  require_before:
    - push-changes
    - merge

logging:
  enabled: true
  level: info
  directory: /home/aiagent/workspace/ai-controller/logs

memory:
  enabled: true
  directory: /home/aiagent/workspace/ai-controller/memory
